name: Sync MAS version

# 每 6 小時抓 Mac App Store(MAS)上架版本，若與 docs/index.html 內 marker
# 不同就 commit + push 同步。MAS 落後 GitHub 是正常的(人工審核)，
# 此 workflow 讓 Landing Page 上「Mac App Store」按鈕的版本副標永遠
# 反映 MAS 真實狀態，不需要人工同步。
#
# 用 GITHUB_TOKEN 推回 main 不會觸發其他 workflow(GitHub 設計如此)，
# 所以不會跟 release.yml 互相觸發成迴圈。

on:
  schedule:
    - cron: '40 */6 * * *'  # 每 6 小時 :40，錯開 cws(:00) / amo(:20)
  workflow_dispatch:        # 允許手動觸發(測試用)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch MAS listing & extract version
        id: mas
        run: |
          set -euo pipefail

          # iTunes Lookup API 公開無需認證，回傳 JSON 含 results[0].version
          # 文件:https://performance-partners.apple.com/search-api
          URL="https://itunes.apple.com/lookup?id=6768586680&country=tw"

          JSON=$(curl -sf "$URL")

          VERSION=$(printf '%s' "$JSON" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['results'][0]['version'] if d.get('results') else '')")

          if [ -z "$VERSION" ]; then
            echo "::error ::Failed to extract MAS version from iTunes Lookup API response."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected MAS version: $VERSION"

      - name: Update docs/index.html if version changed
        run: |
          set -euo pipefail

          NEW="${{ steps.mas.outputs.version }}"
          CUR=$(grep -oE '<!-- mas-version-start -->[0-9.]+<!-- mas-version-end -->' docs/index.html \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -z "$CUR" ]; then
            echo "::error ::Could not find <!-- mas-version-start -->...<!-- mas-version-end --> marker in docs/index.html"
            exit 1
          fi

          if [ "$NEW" = "$CUR" ]; then
            echo "MAS version unchanged ($CUR), no update needed."
            exit 0
          fi

          echo "Updating MAS version: $CUR → $NEW"
          sed -i -E "s|<!-- mas-version-start -->[0-9.]+<!-- mas-version-end -->|<!-- mas-version-start -->${NEW}<!-- mas-version-end -->|" docs/index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "docs — Landing Page MAS 版本自動同步：${CUR} → ${NEW}"
          git push
