name: Sync AMO version

# 每 6 小時抓 Mozilla Add-ons (AMO) 上架版本，若與 docs/index.html 內 marker
# 不同就 commit + push 同步。AMO 落後 GitHub 是正常的（人工審核），
# 此 workflow 讓 Landing Page 上「Firefox Add-ons」按鈕的版本副標永遠
# 反映 AMO 真實狀態，不需要人工同步。
#
# 用 GITHUB_TOKEN 推回 main 不會觸發其他 workflow（GitHub 設計如此），
# 所以不會跟 release.yml 互相觸發成迴圈。

on:
  schedule:
    - cron: '20 */6 * * *'  # 每 6 小時 :20，錯開 sync-cws-version 的整點
  workflow_dispatch:        # 允許手動觸發（測試用）

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch AMO listing & extract version
        id: amo
        run: |
          set -euo pipefail

          # AMO v5 API 公開無需認證，回傳 JSON 含 current_version.version
          # 文件:https://mozilla.github.io/addons-server/topics/api/addons.html
          URL="https://addons.mozilla.org/api/v5/addons/addon/shinkansen/"

          JSON=$(curl -sf "$URL")

          VERSION=$(printf '%s' "$JSON" | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['current_version']['version'])")

          if [ -z "$VERSION" ]; then
            echo "::error ::Failed to extract AMO version from API response."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected AMO version: $VERSION"

      - name: Update docs/index.html if version changed
        run: |
          set -euo pipefail

          NEW="${{ steps.amo.outputs.version }}"
          CUR=$(grep -oE '<!-- amo-version-start -->[0-9.]+<!-- amo-version-end -->' docs/index.html \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -z "$CUR" ]; then
            echo "::error ::Could not find <!-- amo-version-start -->...<!-- amo-version-end --> marker in docs/index.html"
            exit 1
          fi

          if [ "$NEW" = "$CUR" ]; then
            echo "AMO version unchanged ($CUR), no update needed."
            exit 0
          fi

          echo "Updating AMO version: $CUR → $NEW"
          sed -i -E "s|<!-- amo-version-start -->[0-9.]+<!-- amo-version-end -->|<!-- amo-version-start -->${NEW}<!-- amo-version-end -->|" docs/index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "docs — Landing Page AMO 版本自動同步：${CUR} → ${NEW}"
          git push
