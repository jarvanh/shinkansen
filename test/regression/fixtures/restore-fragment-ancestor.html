<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>restore fragment ancestor</title>
</head>
<body>
  <!--
    結構特徵:容器 .wrapper 同時(a)有直屬文字「Categories:」+ inline <i><a> 尾段
    → collectParagraphs Case A 抽 inline fragment(fragment.el = .wrapper);
    (b)包住 <article> 內多個 <p> block 單元(各自為 element unit)。
    → fragment 容器是其他 block 單元的祖先,觸發 v1.10.45 修的還原污染 bug。
    真實對應:telefoncek.si 文章頁 .wrapper(尾段「Kategorije:」+ 內含 37 個 ARTICLE P)。
  -->
  <div class="wrapper" id="wrap">
    <article class="post">
      <p id="p1">NanoKVM is a hardware KVM switch developed by a small hardware company abroad.</p>
      <p id="p2">Using it is quite simple once you connect the ethernet cable to your router.</p>
      <p id="p3">The device can be connected to the target computer using a standard HDMI cable.</p>
    </article>
    Categories:
    <i><a href="#a">Information technology</a></i>,
    <i><a href="#b">Open hardware projects</a></i>
  </div>
</body>
</html>
