<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hidden non-block container skip fixture</title>
</head>
<body>
  <main id="content-main">
    <!-- 重現結構：display:none 的非 block 容器（DIV 不在 BLOCK_TAGS_SET）,
         直接 text node + <br><br> → Case B（containerWithBr）路徑。
         容器級 Case A-F 原本不查 SK.isVisible，隱藏的 template / 未展開 modal /
         prerender 內容照收照翻純燒 token。結構性通則：display:none 容器，不綁站點。 -->
    <div id="hidden-container" style="display:none">
      First hidden paragraph line with plenty of English words inside it.<br><br>Second hidden paragraph line that is also long enough to qualify.
    </div>

    <!-- 對照組：同結構但可見 → 應照常走 Case B 收為 element unit,
         證明 Case B 路徑在本 fixture 有跑到（避免「路徑根本沒執行」的假綠）。 -->
    <div id="visible-container">
      First visible paragraph line with plenty of English words inside it.<br><br>Second visible paragraph line that is also long enough to qualify.
    </div>
  </main>
</body>
</html>
