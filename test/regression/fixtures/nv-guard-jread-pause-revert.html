<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: nv-guard-jread-pause-revert</title>
</head>
<body>
  <!--
    對應「NYT 圖說翻譯後變回英文且永不修復」三洞修復（2026-07-16,JRead 端 cage probe 診斷）。

    結構特徵（結構性通則,不綁站點）:
      含多 text node 的 block element（圖說類:說明 span + 來源 span）,framework-managed
      → 走 nodeValue mutate 注入。外部 reader extension 透過 'jread-reader-mode'
      CustomEvent 讓 content guard 讓位期間,framework 對元素做 re-render 把 text node
      打回原文（換新 node 物件 / reuse node reset 兩型都要涵蓋）。

    三洞（各自獨立,spec 內逐洞驗證）:
      洞 1  guard 讓位盲窗——暫停期間連 nv 軌一起停,回退無人修
      洞 2  resume 無補課——恢復時對盲窗期間的回退沒有一次性 reconcile
      洞 3  sweep 閘門依賴 backup 值——stale originalValue + reuse-node 全段回退時
            allDetached / reverted 都不成立,永久跳過（終態）;lifetime 停損 8 次耗盡
            後同樣永久跳過

    #cap  = 主角圖說（revert 重套場景）
    #cap2 = 內容已變場景（resume 補課應 unmark 重翻,不可重套舊譯文）
    #para = innerHTML 軌對照組（讓位期間 innerHTML 軌必須維持暫停,鎖 v1.10.65 防閃動）
  -->
  <article>
    <p id="cap"><span>A caption sentence that plainly describes the scene shown in the photo.</span><span>Photographer Name/Agency</span></p>
    <p id="cap2"><span>Another caption line that describes a different photograph entirely.</span><span>Second Photographer/Agency</span></p>
    <p id="para">A regular body paragraph that stays under the innerHTML guard track.</p>
  </article>
</body>
</html>
