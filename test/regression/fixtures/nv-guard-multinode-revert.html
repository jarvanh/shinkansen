<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: nv-guard-multinode-revert</title>
</head>
<body>
  <!--
    對應「framework 重繪把 nv-mutate 譯文打回原文,但 guard 沒守住」bug（2026-07-02）。

    結構特徵（結構性通則,不綁站點）:
      一個含多個 text node 的 block element（圖說類:說明文字 span + 來源 span）。
      framework-managed（React fiber）→ 走 nodeValue mutate 注入。

    Bug:1s sweep runContentGuardNvMutate 的重套閘門要求「backup node 全部 detach」,
      framework 只重繪「部分」節點時(常見於多 text node 元素)閘門不成立 → sweep 跳過;
      A4 各 path 也可能都不觸發 → 元素卡「標 translated 但顯示原文」。

    這裡用兩段 span（兩個 text node）重現多節點結構。
  -->
  <article>
    <p id="cap"><span>A caption sentence that plainly describes the scene shown in the photo.</span><span>Photographer Name/Agency</span></p>
  </article>
</body>
</html>
