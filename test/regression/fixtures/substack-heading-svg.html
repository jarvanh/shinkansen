<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Substack heading SVG fixture</title></head>
<body>
<!-- v1.4.22 regression fixture：帶 SVG icon 的 heading 不該被 v1.4.20 mediaCardSkip 誤傷

  典型結構（Substack / 其他附錨點的部落格）：
    <h2>
      <div class="anchor"><svg>...</svg></div>   ← anchor/permalink 小圖示
      真正的標題文字
    </h2>

  v1.4.20 以前的 Bug：
    v1.4.20 為了修 XenForo 附件預覽圖消失，加了 mediaCardSkip：
      containsMedia(el) && 含 CONTAINER_TAGS 直屬子元素 → FILTER_SKIP
    但 containsMedia 的定義含 svg（img/picture/video/svg/canvas/audio），
    所以 Substack 這類「H2 + svg icon + div.anchor + 文字」的標題也被判成媒體卡片，
    整個 H2 FILTER_SKIP → 標題文字從未被收進翻譯單元 → 頁面上標題保持英文。

  v1.4.22 修法：把觸發條件從 containsMedia 窄化為
    el.querySelector('img, picture, video')
  只收「功能性媒體」，排除 svg/canvas/audio。
  SVG 絕大多數是小圖示或裝飾，不該當成「媒體卡片」的辨識訊號。

  注意：fixture 外層用 <div id="..."> 包住，TreeWalker root 本身不觸發 acceptNode，
  id 若放 H2 上 walker 就從 H2 內部開始走，新的 skip 條件永遠不會對 H2 本身評估。
-->

<!-- 正向 target：h2 含 svg icon + div.anchor + 直接文字（Substack-style） -->
<div id="target-substack-heading">
  <article>
    <h2 class="header-anchor-post">
      <div class="anchor">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M0 0L16 16"></path></svg>
      </div>
      The Real Substack Heading That Should Get Translated Into Chinese
    </h2>
  </article>
</div>

</body>
</html>
