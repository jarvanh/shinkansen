<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-dropcap-wordsplit</title>
</head>
<body>
  <!--
    v1.10.48 Layer A3.5:dropcap 首字下沉段的「純文字 nodeValue mutate」fallback。

    結構特徵(結構性通則,不綁站點):雜誌排版常見 dropcap pattern —
    段落第一個字母是獨立 text node,接著 styling-only SPAN(small-caps 樣式)
    從單字「字母中間」接續,再接段落其餘文字:

      <p>F<span class="smallcaps">inding a way</span> forward ...</p>
                ^^^ 單字 "Finding" 被切成 "F" + "inding a way"

    Bug:CJK 譯文沒有「首字母」可對應,LLM 兩種輸出都無法同構還原:
      1. 丟掉佔位符(純文字譯文)→ deserialize ok=false
      2. 佔位符保留但首字併進 span → 譯文序列 [SPAN, TEXT] 2 項 vs
         source [TEXT, SPAN, TEXT] 3 項 → A3 對齊 fail
    兩者在 framework-managed 分支原本都直接 fallback dual visible
    (原文保留 + 譯文 sibling),使用者看起來「這段沒翻到」。

    修法(Layer A3.5):slots 全為 styling-only inline(非 <a> / atomic /
    reuseNode)時,剝掉佔位符走純文字 nodeValue mutate(整段譯文塞第一個
    text node、其餘清空)。只動 nodeValue,fiber-safe 同 Layer A1。

    #target-link 是 guard 對照組:含 <a> slot 的段落不可走 A3.5(flatten
    會清空連結文字),必須維持 dual visible fallback。
  -->
  <article>
    <p id="target-dropped" class="article-paragraph article-dropcap">F<span class="smallcaps">inding a way</span> forward took longer than expected, but the journey itself became the reward for everyone involved.</p>

    <p id="target-echoed" class="article-paragraph article-dropcap">B<span class="smallcaps">y the time</span> winter arrived, the mood had shifted and a quieter feeling settled over the old house.</p>

    <p id="target-link">Read the <a href="https://example.com/report">full report</a> for more details about the findings.</p>
  </article>
</body>
</html>
