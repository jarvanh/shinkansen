<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="utf-8"><title>P1 mixed-content target-aware skip</title></head>
<body>
  <div id="target">
    <!-- 模擬 upmedia.mg 標題結構 ── h1 含 <span> 強調某詞 -->
    <h1 id="trad-mixed-heading">標題結構含巢狀<span>強調詞</span>結尾</h1>

    <!-- mixed inline 路徑:p 含 <strong> -->
    <p id="trad-mixed-paragraph">這是一段含<strong>強調詞</strong>的繁體中文內容,用來驗證偵測路徑能否正確判定語言種類</p>

    <!-- 對照組:純文字繁中段落(走 element 路徑,非 fragment) -->
    <p id="trad-plain">這是純文字繁體中文段落,沒有任何巢狀的行內結構標記</p>

    <!-- 對照組:純文字英文段落 -->
    <p id="en-plain">This is a plain English paragraph without inline structure.</p>

    <!-- 英文 mixed inline ── target=en 該跳 -->
    <h2 id="en-mixed-heading">English heading with <strong>bold</strong> inline part</h2>
  </div>
</body>
</html>
