<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>detect footnote button paragraph</title>
</head>
<body>
  <div id="content-main">
    <!-- prose 段落 + 內嵌 icon-only 註腳按鈕(bigfoot.js 形狀：div 容器 > 零文字 button > svg)。
         注意：<div> 不能靜態寫在 <p> 內(HTML parser 會把 p 拆開)，真站是 bigfoot 用
         DOM API 插入 —— 這裡用下方 script 重現同樣的 DOM 操作。
         直接文字 >= 100 字 → 不是 widget 容器，必須整段收進候選 -->
    <p id="prose-p">There has been a great deal of discussion recently about application icon design and the constraints imposed on it,<span id="fn-marker"></span> and many people who care about visual design have taken up the cause with considerable enthusiasm across the community.</p>

    <!-- 對照組：卡片式互動 widget(直接文字趨近 0，文字都在子元素)必須維持跳過 -->
    <ul>
      <li id="widget-card">
        <div>
          <span>Jane Doe</span>
          <span>@janedoe</span>
        </div>
        <div>
          <span>Software engineer.</span>
        </div>
        <button type="button">Follow</button>
      </li>
    </ul>
  </div>
  <script>
    // 重現 bigfoot.js 的 DOM 操作：把 div 容器 + 零文字 button(內只有 svg)插進 <p>
    (function () {
      const p = document.getElementById('prose-p');
      const marker = document.getElementById('fn-marker');
      const div = document.createElement('div');
      div.className = 'fn-container';
      div.innerHTML = '<button class="fn-btn" data-footnote="test">'
        + '<svg viewBox="0 0 6 6" width="8" height="8"><circle r="3" cx="3" cy="3"></circle></svg>'
        + '</button>';
      p.insertBefore(div, marker);
      marker.remove();
    })();
  </script>
</body>
</html>
