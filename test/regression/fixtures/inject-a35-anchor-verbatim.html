<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a35-anchor-verbatim</title>
</head>
<body>
  <!--
    v1.10.49 Layer A3.5 的 <a> slot 收窄版放行。

    結構特徵(結構性通則,不綁站點):
      #target-verbatim — 段落含「highlight inline(mark)內嵌 <a>」,
        閱讀平台的使用者劃線功能常產生此形:
        <p>... <mark><a>Crystal Echo</a></mark> ...</p>
      #target-linkstart — 段落以 <a> 開頭(第一個可見 text node 在 <a> 內)

    Bug:LLM 丟佔位符(deserialize ok=false)時 A3 無法對齊;A3.5 原 gate 對
    含 <a> slot 的段落一律讓路 → framework-managed 分支掉 dual visible
    (原文 + 譯文並列)。但 prompt 要求專有名詞保留原文,連結文字幾乎都逐字
    出現在譯文內 — 此時 flatten 唯一損失是可點擊性,文字內容零遺失。

    修法:el 內所有 <a> 可見文字都逐字出現在譯文 + 第一個可見 text node 不在
    <a> 內(避免整段譯文變成連結)→ 放行 A3.5 flatten;任一不成立維持 dual。
  -->
  <article>
    <p id="target-verbatim">The new album from <mark class="hl"><a href="https://example.com/ce">Crystal Echo</a></mark> arrives this fall season.</p>

    <p id="target-linkstart"><a href="https://example.com/dn">Delta Note</a> released a brand new single earlier today.</p>
  </article>
</body>
</html>
