<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>product-card-carousel</title>
  <style>
    .card { display: block; width: 200px; }
    .img-link, .title-link, .price-link { display: block; }
    .truncation { display: flow-root; }
    .a-row { display: block; }
    .icon-row { display: block; }
    .rating-link { display: inline; }
    .star-icon { display: inline-block; }
    .sr-only { display: block; position: absolute; clip: rect(0,0,0,0); }
    .count { display: inline; }
    .badge-link { display: inline; }
    .badge-container { display: inline-block; }
    .badge-icon { display: inline-block; }
    .category { display: inline; }
    .price-wrapper { display: inline-block; }
    .discount { display: inline; }
    .price { display: inline; }
    .price-offscreen { display: block; position: absolute; clip: rect(0,0,0,0); }
    .price-symbol { display: inline; }
    .price-whole { display: inline; }
    .ref-label { display: inline; }
    .ref-price { display: inline; text-decoration: line-through; }
    .delivery { display: block; }
  </style>
</head>
<body>
  <!--
    Amazon JP 商品卡片 carousel 結構重現。
    抽自 2026-05-25 amazon.co.jp/product-reviews/ 頁面底部
    「スマートホームデバイスのお買い得セール」carousel。

    bug 症狀:翻譯後 rating / badge / price 全消失,只剩標題。

    結構: li > span > div.card > [a(img), a(title), div.a-row(rating),
    div.a-row(badge), div.a-row(price)]
  -->
  <li style="display:inline-block; list-style:none;">
    <span>
      <div class="card">
        <!-- 商品圖 -->
        <a class="img-link" href="/dp/B001">
          <div><div><img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="SwitchBot"></div></div>
        </a>
        <!-- 商品標題 -->
        <a class="title-link" href="/dp/B001">
          <span><div class="truncation">SwitchBot スイッチボット スイッチ ボタンに適用 指ロボット スマートスイッチ スマートホーム ワイヤレス タイマー</div></span>
        </a>
        <!-- 星等 -->
        <div class="a-row">
          <div class="icon-row">
            <a class="rating-link" href="/dp/B001#reviews">
              <i class="star-icon"><span class="sr-only">5つ星のうち4.1</span></i>
              <span class="count">30,102</span>
            </a>
          </div>
        </div>
        <!-- 徽章 -->
        <div class="a-row">
          <a class="badge-link" href="/dp/B001">
            <div class="badge-container"><i class="badge-icon">ベストセラー1位</i></div>
            <span class="category">- カテゴリ <span>電設用スイッチ</span></span>
          </a>
        </div>
        <!-- 價格 -->
        <div class="a-row">
          <div class="price-wrapper">
            <a class="price-link" href="/dp/B001">
              <div class="a-row">
                <span class="discount">-15%</span>
                <span class="price">
                  <span class="price-offscreen">￥4,236</span>
                  <span><span class="price-symbol">￥</span><span class="price-whole">4,236</span></span>
                </span>
              </div>
              <div class="a-row">
                <span class="ref-label"><span>参考:</span><span class="ref-price">￥4,980</span></span>
              </div>
            </a>
          </div>
          <div class="delivery">
            <span>無料配送 <b>6月1日 月曜日</b>にお届け</span>
          </div>
        </div>
      </div>
    </span>
  </li>
</body>
</html>
