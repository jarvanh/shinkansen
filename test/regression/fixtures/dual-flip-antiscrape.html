<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>fixture: dual mode 譯文繼承站點反爬蟲翻轉 transform</title>
</head>
<body>
  <!--
    結構性通則（§8）：某些站點用「祖先 scaleY(-1) + 該元素自身 scaleY(-1)」雙重翻轉
    互相抵消來反爬蟲——原文字經兩層翻轉後正立，但 dual wrapper 以 sibling 身分插進
    「只有祖先那層翻轉」的位置，少吃一次翻轉 → 譯文上下顛倒。
    不綁站點 / class，純以「軸對齊翻轉 transform 巢狀」描述。

      #flip-target      — 祖先 scaleY(-1)；wrapper（sibling）淨繼承 1 次翻轉 → 需補 scaleY(-1)
      #even-target      — 祖先兩層 scaleY(-1)；wrapper 淨繼承偶數次翻轉 → 天然正立，不補
      #noflip-target    — 無翻轉祖先 → wrapper 不套任何 transform
      #rotate-target    — 祖先為 rotate(30deg)（含旋轉，非軸對齊）→ 保守不動
  -->

  <!-- 單層翻轉祖先：對應 Google 搜尋標題（span 翻轉 > a > h3 翻轉 > 文字） -->
  <div>
    <span style="display:inline-block; transform: scaleY(-1);">
      <a href="#">
        <h3 id="flip-target" style="transform: scaleY(-1);">English Result Title One</h3>
      </a>
    </span>
  </div>

  <!-- 雙層翻轉祖先：淨偶數 → 不需補償 -->
  <div style="transform: scaleY(-1);">
    <div style="transform: scaleY(-1);">
      <h3 id="even-target">English Result Title Two</h3>
    </div>
  </div>

  <!-- 無翻轉祖先：對照組 -->
  <div>
    <a href="#">
      <h3 id="noflip-target">Plain Result Title</h3>
    </a>
  </div>

  <!-- 含旋轉的祖先（非軸對齊）：保守不動 -->
  <div style="transform: rotate(30deg);">
    <h3 id="rotate-target">Rotated Container Title</h3>
  </div>
</body>
</html>
