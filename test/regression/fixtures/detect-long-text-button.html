<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Long-text button detection fixture</title>
</head>
<body>
  <article>
    <p>この商品についての一般的な説明文です。通常の段落として検出されるべきです。</p>

    <!-- 長文 BUTTON:句子級內容,應被偵測 -->
    <div class="suggested-questions">
      <button class="pill-button">
        <span>この商品はオーブンで使用できますか？</span>
      </button>
      <button class="pill-button">
        <span>どのくらいの長さがありますか？</span>
      </button>
      <button class="pill-button">
        <span>他のことについて聞いてください</span>
      </button>
    </div>

    <!-- 長文 BUTTON 無 SPAN wrapper:直接含文字 -->
    <div>
      <button class="question-chip">この烘焙紙は電子レンジで使えますか？</button>
    </div>

    <!-- CJK BUTTON >= 3 字:有意義的 UI 文字,應被偵測 -->
    <div class="commerce">
      <span><button class="btn-cart">カートに入れる</button></span>
      <span><button class="btn-options">購入オプション</button></span>
    </div>
    <div class="review-actions">
      <button class="btn-helpful">参考になった</button>
      <button class="btn-report">報告する</button>
    </div>

    <!-- 極短 CJK BUTTON(< 3 字)/ 短 non-CJK(< 8 字):不應被偵測 -->
    <div class="actions">
      <button class="btn-submit">送信</button>
      <button class="btn-cancel">取消</button>
      <button class="btn-ok">OK</button>
      <button class="btn-reply">Reply</button>
      <button class="btn-follow">Follow</button>
    </div>

    <p>商品レビューセクションの段落です。これも通常通り検出されるべきです。</p>
  </article>
</body>
</html>
