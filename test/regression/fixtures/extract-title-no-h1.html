<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- single mode 不動 <head><title> → 永遠原文。pickExtractTitle 不可退回這個 -->
  <title>The Original English Title – Some Site</title>
  <meta property="og:title" content="The Original English Title">
</head>
<body>
  <!-- 頁面層級 header / nav:站名、上一篇導覽。這些標題不是文章主標,
       且常沒被翻譯（banner / nav 排除）。不可被當成標題。 -->
  <header>
    <nav><h4>上一篇文章導覽標題</h4></nav>
  </header>

  <!-- 文章內容區。WordPress / CMS 常見:主標是 <h2 class="post-title"> 而非 <h1>。
       single mode 已就地翻譯 → 這裡是譯文。整頁沒有任何 <h1>。 -->
  <main>
    <h2 class="post-title">譯文文章主標題</h2>
    <div class="post-content">
      <h3>第一個小節</h3>
      <p>這是文章的第一段內文,提供足夠長度讓抽取器把它當正文。</p>
      <p>第二段內文,延續上一段的論點。</p>
    </div>
  </main>

  <footer><h3>頁尾標題（不是文章主標）</h3></footer>

  <div id="target">ready</div>
</body>
</html>
