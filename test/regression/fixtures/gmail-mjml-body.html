<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: gmail-mjml-body-text</title>
</head>
<body>
  <!--
    對應 v0.49 修的 MJML font-size:0 body 文字消失 bug 的「正向 case」。
    Sanitized 重現 Gmail Claude Code welcome email 的 step 卡片內文區
    (不是按鈕,按鈕的 fixture 在 gmail-button.html)。

    結構特徵 (重要,不要動):
      - 外層 <td> font-size:0 (MJML / Mailjet 用來消除 inline-block-gap)
      - 內層 <div> font-size:16px line-height:1.5 (真正的內文字體大小)
      - 內層 <div> 含純文字,沒有任何 preservable inline 元素
        → 序列化後 slots 是空的,走 no-slots 路徑 (replaceTextInPlace)
      - 內層 <div> 沒有 class、沒有特殊屬性 → 跟一般 MJML wrapper 一樣
        要靠 font-size 結構特徵被認出來,不靠站點 / class 識別

    v0.48 的 bug:
      replaceTextInPlace 直接 `el.textContent = translation`,把整個 td
      內容換掉 → 內層 <div> 連帶被清掉 → 譯文直接坐落在 td 下繼承 0px →
      整段視覺上消失。
    v0.49 的修法 (後來在 v0.55 重構成 resolveWriteTarget + injectIntoTarget
    共用 helper):
      偵測到 td font-size:0,walker descend 找第一個 font-size 正常的非 slot
      非 atomic 後代,撞到 inner <div> 16px,把它當寫入目標,clean slate 它
      的 children 後 append 新文字 → div 留下、字體大小留下、譯文正確顯示。

    這個 fixture 的工作:餵進 td + 純文字「步驟一:在你的電腦上安裝...」,
    斷言「td 內仍有直接子 <div>、該 <div> 字體 16px、該 <div> 文字 = 譯文」。
  -->
  <table cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td id="target" align="left" style="font-size:0;line-height:0;padding:16px">
        <div style="font-size:16px;line-height:1.5;font-family:Helvetica,Arial,sans-serif;color:#222">
          Step 1: Install the Claude Code CLI on your machine and authenticate with your Anthropic account.
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
