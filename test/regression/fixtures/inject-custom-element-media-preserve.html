<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>custom element media preserve fixture</title>
<style>
  /* 模擬「已升級」的媒體型自訂元素(如 AMP 元件 upgraded 狀態):inline-block 佔位 */
  x-media { display: inline-block; width: 200px; height: 120px; background: #eee; }
  x-sizer { display: block; }
  /* 模擬「未升級」的媒體型自訂元素:無子節點、無文字,display 由外部 CSS 撐 */
  x-lazy-img { display: block; width: 200px; height: 100px; background: #ddd; }
  /* 圖 + 圖說群組:block display,含 lazy 自訂元素與直接圖說文字 */
  .feat { display: block; width: 300px; }
  /* 行內 widget 自訂元素(textless、inline-level):留在 inline run 走 atomic */
  x-inline-widget { display: inline-block; width: 16px; height: 16px; background: #ccc; }
  .card { width: 240px; }
</style>
</head>
<body>
<div id="host">
  <!-- Case 1(inject media-sparing):人物卡結構——已升級自訂元素(內含框架內部
       空殼 sizer + 真實 img)+ 多個帶文字子元素(≥2 個 <b>)。textBearingChildCount
       守門會把 (B) media-preserving 踢掉走 (A) clean slate,舊行為整顆清空。 -->
  <div class="row">
    <div id="card" class="card">
      <x-media><x-sizer></x-sizer><img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="portrait"></x-media><br>
      <b>Ada Lovelace</b><br>
      <b>Born:</b> December 10, 1815<br>
      <b>Birthplace:</b><br>
      London, England
    </div>
  </div>

  <!-- Case 2(detect isBlockMediaGroup 斷 run)+ Case 3(serialize media-like atomic):
       容器 loose text 形成 inline run;.feat 是「block display + 未升級自訂元素 +
       圖說直接文字」的媒體群組,不得被吸進 run;x-inline-widget 是 inline-level
       textless 自訂元素,留在 run 內走 atomic slot 保留。 -->
  <div id="qa">
    Some plain prose with an inline widget <x-inline-widget></x-inline-widget> sits directly in the container.
    <div id="feat" class="feat"><x-lazy-img></x-lazy-img>A caption describing the picture above.</div>
    More loose prose text continues after the figure block here.
  </div>
</div>
</body>
</html>
