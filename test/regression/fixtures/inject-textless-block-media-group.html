<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>textless block media group fixture</title>
  <style>
    /* 媒體(頭像)尺寸只靠祖先範圍後代選擇器撐 —— 重現「.reader img { width } 」結構。
       媒體本身(IMG)沒 class、沒 width/height 屬性,尺寸完全依賴 .media-group 祖先。 */
    .media-group {
      display: flex;
      flex-direction: row-reverse;
    }
    .media-group img {
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
    }
    /* 一旦 IMG 被拍平到 .media-group 之外,只剩這條 fallback → 爆成原生大尺寸
       (重現 user-default.png 從 18px 變 110px) */
    img {
      width: 110px;
      height: 110px;
    }
  </style>
</head>
<body>
  <!-- 容器直屬:text「阅读」+ <span> 數字 + block-level(flex)媒體群組。
       媒體群組無 translatable 文字、只包 IMG,靠自身 class 的後代 CSS 定尺寸。 -->
  <div id="target" class="reading">
    阅读 <span>9645</span>
    <div class="media-group">
      <span><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt=""></span>
      <span><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt=""></span>
      <span><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt=""></span>
      <span><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt=""></span>
      <span><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt=""></span>
    </div>
  </div>
</body>
</html>
