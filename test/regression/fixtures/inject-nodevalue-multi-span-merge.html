<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-nodevalue-multi-span-merge</title></head>
<body>
  <!--
    對應 v1.10.4 修「Google MT / Gemini + 單語覆蓋 + framework-managed element,
    source text 分散在多個 inline SPAN 內 → tryInjectNodeValueMutate Case 3
    chunks < textNodes → fallback dual sibling wrapper」bug。

    結構特徵(不綁站名):
      React site 把同段落文字拆成多個 inline SPAN(每個 SPAN 含一個 text node)。
      Google MT / Gemini serializer 對 SPAN 一律透明展開(取文字,不產 slot)。
      翻譯結果是連續段落(1 chunk),source 有 N 個 text node(N > 1)。
      tryInjectNodeValueMutate Case 3: chunks.length (1) < textNodes.length (N)
      → 原本 return false → fallback injectDual → single mode 出現 dual wrapper。

    修法(v1.10.4):
      Case 3b: chunks < textNodes 時,整段譯文塞第一個 text node,其餘清空。
      inline SPAN 分隔不代表段落分隔,清空後視覺等同 single 覆蓋。

    模擬真實 X quoted tweet 結構(2026-05-24 Chrome for Claude 真實 dump):
      <div data-testid="tweetText">
        <span class="...">段落前半</span>
        <span class="...">
          <span class="...">@mention</span>
        </span>
        <span class="...">段落後半(含 \n 換行)</span>
      </div>
  -->

  <!-- Case 1: 3 text nodes, 1 chunk (no paragraph break in translation) -->
  <div id="tweet-simple" data-testid="tweetText">
    <span class="s1"><span class="leaf">Hello world, </span></span><span class="s2"><span class="leaf">@ProtonVPN</span></span><span class="s3"><span class="leaf"> is Swiss. Not happening.</span></span>
  </div>

  <!-- Case 2: 3 text nodes, 2 chunks (translation has paragraph break) -->
  <div id="tweet-with-break" data-testid="tweetText">
    <span class="s1"><span class="leaf">First paragraph text. </span></span><span class="s2"><span class="leaf">@mention</span></span><span class="s3"><span class="leaf"> end of first.
Second paragraph here.</span></span>
  </div>
</body>
</html>
