<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dual mode inline BUTTON preserved fixture</title>
</head>
<body>
  <main id="content-main">
    <!-- 重現結構：段落內 inline <button>（SPA「show more」展開觸發鈕）。
         serialize 端對含實質文字的 inline BUTTON 走 reuseNode slot（保留 React
         fiber 讓點擊仍能觸發框架 handler）。結構性通則，不綁站點。 -->

    <!-- Case 1:dual 正常注入（譯文 != 原文） -->
    <p id="target-1">Read the full essay <button id="btn-1" class="more">Show more</button> for all the details.</p>

    <!-- Case 2:echo skip（譯文 == 原文，LLM 照搬）-->
    <p id="target-2">Open the thread <button id="btn-2" class="more">Show replies</button> to continue reading.</p>
  </main>
</body>
</html>
