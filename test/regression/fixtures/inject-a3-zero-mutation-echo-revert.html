<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a3-zero-mutation-echo-revert</title>
</head>
<body>
  <!--
    Layer A3「aligned 但零 text mutation」→ 假 echo 沖回原文 regression。

    結構特徵（結構性通則，非站點特徵）:framework-managed 段落的全部內容被
    「單一 preservable inline wrapper」（帶 class 的 SPAN,serializer 視為 slot 0）
    包住，wrapper 內是多個 inline + text 混排（strong 引號、a>strong 雙層標題、
    獨立 em、自由 text）。

    Bug 鏈（v2.0.65 修，新聞站 CMS 內文 li 實例）:
      1. LLM（lite 級）譯文把佔位符巢狀弄壞——只回 0/1/2 三對且巢狀與 source
         不同構（source: 2(a) 內含 3(strong)；譯文： 1 包 2,3/4/5 全丟）
      2. deserialize ok=true（marker 平衡）,frag = [SPAN(slot0) > text+STRONG>A+text]
      3. A3 頂層對齊：source [inline(SPAN)] vs target [inline(SPAN)] 1:1 tag 相符
         → strictOk=true;wrapper 內部遞迴對齊 6 vs 3 items 失敗，但 opaque inline
         內部失敗「刻意不致命」（v1.9.31 鬆綁）→ strictMutations 收集到 0 條
      4. tryInjectNodeValueMutate 回 true 但一個字都沒寫 → caller echo 偵測看
         DOM 文字沒變 → 誤判「模型 echo」→ 沖回原文 + 標 data-shinkansen-translated
         → 好譯文被靜默丟棄，該段永遠顯示原文（rescan 也不重送）
    修法：A3 aligned 後 mutations.length === 0 視為注入失敗 return false,
    讓段落流進 A3.5 flatten（slots 全為 styling/link inline 時）→ 譯文完整注入。
  -->
  <article>
    <ul>
      <li id="target"><span class="cms-markup-wrapper"><strong>“</strong><a href="https://example.com/watch?v=abc123"><strong>How Placeholder Nesting Broke Injection, with Some Guest</strong></a><strong>.”</strong> Really good episode of <em>Some Long Show </em>that makes a compelling argument about markup structure. But not all is lost. </span></li>
    </ul>
  </article>
</body>
</html>
