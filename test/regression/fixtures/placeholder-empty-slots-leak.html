<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: placeholder-empty-slots-leak</title>
</head>
<body>
  <!--
    對應「佔位符 ⟦N⟧ 漏進可見 DOM」bug（2026-07-02）。

    結構特徵（結構性通則，不綁站點）:
      一個「純文字、無 inline 子元素」的 block element。
      serializeWithPlaceholders 對它產出 slots = []（沒有需要保留的 inline 結構）。

    Bug 觸發條件:
      當「空 slots」與「帶佔位符的譯文字串」配對時（真實成因:framework
      re-render 把某段內容搬進純文字元素後重新序列化成空 slots,卻命中一份
      帶佔位符 ⟦N⟧ 的快取譯文——快取存的是未反序列化的原始 API 輸出），
      no-slots 注入路徑不經 deserializeWithPlaceholders,若無防線就把佔位符
      原封寫進 textContent。

    修正前: ⟦0⟧…⟦/0⟧⟦1⟧⟦2⟧…⟦/2⟧…⟦/1⟧ 直接出現在可見文字中。
    修正後: injectTranslation 入口對「空 slots」統一 stripStrayPlaceholderMarkers,
            把「placeholders ⟺ slots」不變量在注入端強制成立。
  -->
  <p id="target" style="font-family:Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#222">People gather around a plain-text caption paragraph that has no inline child elements at all.</p>
</body>
</html>
