<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: nv-guard-reapply-keeps-links</title>
</head>
<body>
  <!--
    對應「guard 補課重套後段落內 <a> 連結消失」bug（2026-07-16）。

    結構特徵（結構性通則,不綁站點）:
      prose 段落內嵌多個 inline <a>（文字-連結-文字交錯）,framework-managed
      → 首翻走 Layer A3 nodeValue mutate（slots 同構配對,<a> 結構保留）。

    Bug:recordNvMutateTranslation 只存純文字譯文;framework 重繪把段落打回原文後,
      guard 重套呼叫 tryInjectNodeValueMutate(el, plain, []) — slots=[] 走 Case 3b
      flatten:整段譯文塞第一個 text node、其餘 text node（含 <a> 內的）清空
      → 連結變空殼消失。

    修法:record 連帶存帶佔位符的原始譯文 + slots,重套（nvReapplySaved）先重走
      A3 同構配對保留 inline 結構,配對不成才 fallback 純文字。
  -->
  <article>
    <p id="para">This week I read about <a href="https://example.com/a">the first linked story</a> and listened to <a href="https://example.com/b">a long mix playlist</a> while writing <a href="https://example.com/c">my big project essay</a> for fun.</p>
  </article>
</body>
</html>
