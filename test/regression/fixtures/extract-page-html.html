<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>擷取測試頁標題</title>
  <style id="page-style">.x { color: red; }</style>
  <link rel="stylesheet" href="should-be-stripped.css">
</head>
<body>
  <!-- 模擬擴充注入的 toast shadow host（送 Instapaper 時要剝掉） -->
  <div id="shinkansen-toast-host" data-noise="ui-chrome">TOAST_UI_NOISE</div>
  <!-- 模擬 dual 模式注入的樣式（要剝掉） -->
  <style id="shinkansen-dual-style">shinkansen-translation { display: block; }</style>

  <article id="target">
    <h1 id="headline">已翻譯的文章標題</h1>
    <p id="body-para">這是文章正文的譯文段落，應該保留並送進 Instapaper。</p>
    <!-- 模擬內嵌影片播放器（Brightcove 等）：下游 reader 會把它升級成主要內容 → 必須剝除 -->
    <iframe id="video-embed" src="https://players.brightcove.net/123/default_default/index.html?videoId=" title="video-iframe">VIDEO_PLAYER_NOISE</iframe>
    <video id="inline-video" src="movie.mp4">VIDEO_TAG_NOISE</video>
    <!-- 模擬 dual 模式譯文 wrapper：要保留（這是要送的譯文本體） -->
    <p>原文段落<shinkansen-translation id="dual-wrapper">這是雙語對照的譯文 wrapper 內容</shinkansen-translation></p>
    <noscript id="page-noscript">請啟用 JavaScript</noscript>
  </article>

  <script id="page-script">window.PAGE_SCRIPT_RAN = true; console.log('SHOULD_NOT_APPEAR');</script>
</body>
</html>
