<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube iOS fullscreen native TextTrack fixture</title>
</head>
<body>
  <!-- 最小 player DOM:#movie_player root + 一個 <video>。
       iOS 原生全螢幕字幕軌 regression(v1.10.27,路徑 A)用——spec 直接設定
       window.__SK.YT.displayCues + config,呼叫 _buildIosFsTrackCues / _ensureIosFsTrack
       驗 cue 組裝與真實建軌。Chromium 支援 addTextTrack / VTTCue,所以這層可自動測;
       _isIOSSafari gate 與 webkitbegin/endfullscreen 切換是 iPhone 實機限定,進 PENDING。 -->
  <div id="movie_player" class="html5-video-player">
    <video width="800" height="450"></video>
  </div>
</body>
</html>
