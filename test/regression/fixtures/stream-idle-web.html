<!DOCTYPE html>

  <title>stream-idle-web fixture</title>
</head>
<body>
  <!--
    最小可翻內容(幾段短 <p>),collectParagraphs 抓成數個 element 單元 → 只有 batch 0。
    用來驅動網頁路徑 runBatch0Streaming,測 streaming idle watchdog。
  -->
  <article id="content">
    <p>This is the first short paragraph used to drive a streaming batch.</p>
    <p>Here is a second paragraph with a little more text to translate.</p>
    <p>And a third paragraph so the batch has a few separate units in it.</p>
  </article>
</body>
