<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>fixture: inline-code-preserve(段落內 <code> 樣式必須在翻譯後保留)</title>
</head>
<body>
  <!--
    對應「GitHub PR 描述等場景:段落內 inline <code> 翻譯後底色 / 樣式消失」bug。

    結構特徵(通用,不綁站名):
      - 段落 <p> 內含 inline <code>identifier</code>
      - 來源:Markdown backtick 渲染、技術文章、PR description

    bug:
      content-serialize.js 兩個 serializer 都先檢查 HARD_EXCLUDE_TAGS(內含 CODE)
      就 continue,inline <code> 元素整顆被丟掉,Gemini 拿不到其文字、
      譯文回來也沒對應 atomic 標記能還原。結果:<code> 樣式徹底消失,
      原文識別字甚至可能被弄丟或翻錯。

    斷言(基於結構特徵):
      1. serializer 輸出文字應含 ⟦*N⟧ atomic 標記,代表 <code> 被保留為 slot
      2. 注入譯文後 DOM 內仍有 <code> 元素且 textContent 維持原英文識別字
      3. <code> 父段落本體仍正常翻成中文(控制組:確保保留 inline 不影響整段翻譯)
  -->

  <article>
    <p id="control">This is a regular article paragraph that should be translated normally without any inline code.</p>

    <p id="with-code">The function <code>fetchData()</code> returns a Promise resolving to a value defined in <code>config.json</code>, which is then passed to <code>renderUI()</code>.</p>
  </article>
</body>
</html>
