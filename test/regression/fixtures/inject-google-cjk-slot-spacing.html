<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-google-cjk-slot-spacing</title></head>
<body>
  <!--
    對應 v1.10.4 修「Google MT 翻成 CJK 時吃掉 placeholder marker 前後空格,
    導致譯文跟 URL/mention 視覺黏在一起」bug。

    結構特徵(不綁站名):
      Google MT serializer 對 A(含 element child)走 atomic【*N】deep clone,
      對 A(純 text child)走 paired marker【N】@mention【/N】。
      Google MT 翻譯後常把 marker 前後空格吃掉(CJK 不用 word separator space),
      deserialized text node 直接黏在 inline element 旁,視覺擁擠。

    修法(v1.10.4):translateUnitsGoogle 路徑 restoreGoogleTranslateMarkers 後,
    對 CJK↔opening/atomic marker 和 closing/atomic marker↔CJK 邊界補空格。

    模擬真實 X 推文結構:主文 SPAN + URL anchor(含 SPAN 子元素)+ 連接詞 SPAN + mention anchor。
  -->
  <!-- 元素間不留 whitespace(模擬 React hydrated DOM 無 whitespace text node) -->
  <div id="tweet" data-testid="tweetText"><span class="main-text">iOS 27 will upgrade the Camera and Photos apps: here's what's rumored</span><a class="url-link" href="https://example.com/article"><span class="url-frag-1">https://</span>example.com/<span class="url-frag-2">article</span><span class="url-frag-3">…</span></a><span class="connector"> via </span><a class="mention" href="/user">@someuser</a></div>
</body>
</html>
