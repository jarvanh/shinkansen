<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SPA by-text reuse restore fixture</title>
</head>
<body>
  <main id="content-main">
    <!-- 正常翻譯路徑的段落：testInject 走 injectTranslation → snapshotOnce,
         讓 STATE.originalHTML 非空（避免 restorePage 走「殭屍頁保底 reload」分支，
         聚焦驗 by-text reuse 元素自己的還原覆蓋）。 -->
    <p id="p-normal">This paragraph is translated through the normal injection path.</p>

    <!-- 重現結構：SPA virtualized timeline remount 的「全新元素」——同原文文字、
         從未被翻譯過。spaByTextReuse 以 textContent 命中 byText cache 直接覆寫
         innerHTML，不送 API。結構性通則，不綁站點。 -->
    <p id="p-remounted">Virtualized item text that was translated before remounting happened.</p>
  </main>
</body>
</html>
