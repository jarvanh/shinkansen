<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Block empty fragment ancestor test</title>
</head>
<body>
  <!-- Case 1: Amazon review card structure.
       LI (BLOCK_TAGS_SET) has containsBlockDescendant (H5),
       but extractInlineFragments on LI produces 0 fragments because
       LI's only direct child (SPAN.a-list-item) itself contains a block
       descendant → isInlineRunNode returns false → no inline run to flush.
       Bug: LI was added to fragmentExtracted anyway, blocking inner spans
       from being collected by Case E (hasAncestorExtracted returned true).
  -->
  <div id="target-review">
    <ul>
      <li id="review-card">
        <span class="a-list-item">
          <div>
            <div>
              <h5>レビュータイトルのテキスト</h5>
            </div>
            <div>
              <span class="review-body">
                <span>とにかく重宝している商品です。大容量で毎日ガンガン使っています。<br></span>
              </span>
            </div>
          </div>
        </span>
      </li>
    </ul>
  </div>

  <!-- Case 2: Same pattern but with longer body text and multiple BRs -->
  <div id="target-long">
    <ul>
      <li id="review-long">
        <span class="a-list-item">
          <div>
            <div>
              <h5>もう一つのレビュータイトル</h5>
            </div>
            <div>
              <span class="review-body">
                <span>コスパが良すぎる。安いからペラペラかと思いきやしっかりしてます。<br>巻きが多いから重たいです。でも品質は最高です。<br></span>
              </span>
            </div>
          </div>
        </span>
      </li>
    </ul>
  </div>

  <!-- Case 3: Amazon star histogram row.
       LI (BLOCK_TAGS_SET) has complex flex layout (17 descendants)
       but only 7 chars of visible text ("星5つ 76%").
       Bug: LI was FILTER_ACCEPT'd as whole element unit, injection
       destroys flex progress bar layout.
       Fix: descendants > 3 + innerText < 20 → FILTER_SKIP.
  -->
  <div id="target-histogram">
    <ul>
      <li id="hist-row" style="list-style:none">
        <span class="a-list-item">
          <a style="display:flex; align-items:center; gap:8px; text-decoration:none; color:inherit">
            <div>
              <span style="display:flex">星5つ</span>
            </div>
            <div style="flex:1; height:16px; background:#eee; position:relative">
              <div style="width:76%; height:100%; background:orange"></div>
            </div>
            <div>
              <span>76%</span>
            </div>
          </a>
        </span>
      </li>
    </ul>
  </div>
</body>
</html>
