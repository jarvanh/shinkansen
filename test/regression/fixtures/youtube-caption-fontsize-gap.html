<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube ASR caption font-size gap fixture</title>
</head>
<body>
  <!-- 最小 player DOM：含 movie_player root、caption-window 內一個 .ytp-caption-segment
       （inline font-size:32px，當「使用者字幕設定」下的真實字體大小）、video（高 450）。
       video 高度啟發式 = round(450 × 0.045) = 20px，刻意跟 32px 不同，讓 spec 能分辨
       「沿用 cache 32」vs「掉到 video 高度啟發式 20」。
       v1.10.26 字幕字體大小空窗期 regression（路徑 A）用。 -->
  <div id="movie_player" class="html5-video-player">
    <div class="ytp-caption-window-container">
      <div class="caption-window">
        <span class="ytp-caption-segment" id="seg1" style="font-size:32px">這是一句字幕</span>
      </div>
    </div>
    <video width="800" height="450"></video>
  </div>
</body>
</html>
