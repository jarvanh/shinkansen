<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SVG anchor leaf-capture skip fixture</title>
</head>
<body>
  <main id="content-main">
    <p>This introductory paragraph exists so the page has normal translatable prose content.</p>

    <!-- 重現結構：inline SVG 內的 <a>（SVGAElement）。
         querySelectorAll('a') 也會匹配它；SVG 元素沒有 innerText,
         被 leaf-anchor 補抓收進 unit 後序列化 undefined.trim() 直接 TypeError。
         結構性通則：任何含 <svg><a><text> 的頁面（圖表 legend / 圖示連結），不綁站點。 -->
    <svg id="chart" viewBox="0 0 300 60" width="300" height="60" xmlns="http://www.w3.org/2000/svg">
      <a href="https://example.com/legend" id="svg-anchor">
        <text x="10" y="30">Interactive chart legend caption with plenty of text</text>
      </a>
    </svg>

    <!-- 對照組：HTML leaf <a>（無 block 祖先、>= 20 字）應照常被 leaf-anchor 補抓，
         證明該補抓路徑在本 fixture 有跑到（避免「路徑根本沒執行」的假綠）。 -->
    <a href="/article" id="html-anchor">This is a plain leaf anchor with enough visible text to qualify.</a>
  </main>
</body>
</html>
