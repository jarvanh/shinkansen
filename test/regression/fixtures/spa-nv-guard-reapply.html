<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: spa-nv-guard-reapply</title>
</head>
<body>
  <!--
    v1.10.49 nv-mutate 元素的 Content Guard 巡檢 + 重套。

    結構特徵:單一 text node 段落,nodeValue mutate 注入後被 framework
    「同內容重 render」— 原 text node 被換成全新 text node(內容仍是英文原文),
    backup node 全部 detach。閱讀平台的劃線 highlight hydration 屬此形。

    Bug:A4(detectAndUnmarkExpandedNodeValueMutate)是 observer batch 反應式,
    revert mutation 落在注入期間 / debounce 視窗外會漏看;Path B 對
    !isConnected entry 直接 skip → 元素永遠卡「標 translated 但顯示英文」。

    修法:
      1. Content Guard 1s sweep 巡 STATE.nodeValueMutateBackup,backup node
         全 detach + 現 textContent === 原文 → 直接重套記錄的純文字譯文(免 API)
      2. 內容已變(框架填了新內容)→ unmark + rescan 重翻
      3. A4 各 path 觸發時同樣先試重套再 unmark
  -->
  <article>
    <p id="target">The committee approved the proposal after a long debate yesterday.</p>

    <p id="target-changed">Original short text about the meeting agenda for today.</p>

    <p id="target-a4">The garden festival attracted thousands of visitors over the weekend.</p>
  </article>
</body>
</html>
