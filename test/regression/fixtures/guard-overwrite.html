<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: guard-content-overwrite</title>
</head>
<body>
  <!--
    對應 v1.0.13+v1.0.14+v1.0.20 的 Content Guard 覆寫修復機制。

    結構特徵 (通則，不綁 Engadget / Facebook):
      SPA 框架在捲動或虛擬捲動時，用 innerHTML 把已翻譯的中文覆蓋回原始英文。
      元素本身不被移除（data-shinkansen-translated 屬性留存），
      但內容被替換。Content Guard 需偵測到 innerHTML 與快取不符，
      並重新套用快取的譯文。

      此測試模擬完整路徑：
      1. testInject 注入譯文（同時填充 STATE.translatedHTML 快取）
      2. setTestState({ translated: true }) 模擬翻譯完成
      3. 用 JS 覆寫 innerHTML 回原始英文（模擬框架行為）
      4. testRunContentGuard() 手動觸發 guard 掃描
      5. 驗證元素內容已恢復成中文譯文

    斷言:
      - 注入後元素包含中文譯文
      - 覆寫後元素恢復為英文
      - guard 掃描後元素回到中文譯文
      - guard 回傳 restored === 1
  -->
  <article>
    <p id="target">The quick brown fox jumps over the lazy dog near the riverbank on a sunny afternoon</p>
  </article>
</body>
</html>
