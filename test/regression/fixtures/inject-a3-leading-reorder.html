<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a3-leading-reorder</title>
</head>
<body>
  <!--
    v1.10.49 segment fallback「開頭溢出文字」case。

    結構特徵(結構性通則,不綁站點):段落以 inline <a> 開頭、開頭沒有 text node —
    圖片說明(figcaption)/ credit line 常見:

      <p><a>Alpha Band</a> and <a>Beta Group</a>, 1960s (Archive Photo)</p>

    Bug:LLM 譯文做 CJK 語序重排,把時間狀語移到句首 —
    「1960 年代的 ⟦0⟧..⟦/0⟧ 與 ⟦1⟧..⟦/1⟧(...)」→ target 序列開頭多出
    source 沒有的 text segment。segment fallback 的溢出吸收原本只能「往前吸」
    (lastProseMutationIdx),開頭沒有 prose mutation 可吸 → segOk=false →
    framework-managed 分支 fallback dual visible(原文 + 譯文 sibling 並列)。

    修法:開頭溢出文字暫存(pendingLeadText),「往後」塞進下一個 inline 的
    內部首個 text mutation(保視覺順序;trade-off:該段文字吃到 inline 樣式)。
  -->
  <article>
    <p id="target"><a href="https://example.com/a">Alpha Band</a> and <a href="https://example.com/b">Beta Group</a>, 1960s (Archive Photo)</p>
  </article>
</body>
</html>
