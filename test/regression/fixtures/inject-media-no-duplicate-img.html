<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-media-no-duplicate-img</title></head>
<body>
  <!--
    對應 Google MT atomic IMG slot 造成的圖片重複 bug。

    結構特徵（不綁站名）：
      <a> 或 <div> 內含 <img> + 文字。Google MT serializer 把 IMG 做成
      atomic slot（【*0】），deserialization 後 fragment 已包含 IMG clone。
      injectIntoTarget 的 media-preserving path (B) 也保留原始 IMG → 兩張。

    真實 case：Amazon.co.jp 商品比較表，每個 <a> 含商品圖 + 商品名。
    Google MT 翻譯後商品圖重複出現兩次。

    修法：當注入 fragment 本身已含 IMG 時跳過 (B)，走 (A) clean-slate。

    斷言：
      - 翻譯後只有 1 張 IMG（不重複）
      - 文字已翻譯
  -->
  <div id="product-card">
    <a id="target-link" href="/product/123">
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="product" width="100" height="100">
      <span class="product-name">Oven Paper 30cm x 50m Bleached</span>
    </a>
  </div>
</body>
</html>
