<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube non-ASR bilingual overlay fixture</title>
</head>
<body>
  <!-- 最小 player DOM:含 movie_player root(_getPlayerRoot 會找)、
       ytp-caption-window-container(常駐 wrapper,_setAsrHidingMode CSS hide target)、
       caption-window(visible 字幕容器,內含 N 個 segment),video。
       v1.8.42 路徑 A regression 用。 -->
  <div id="movie_player" class="html5-video-player">
    <div class="ytp-caption-window-container">
      <div class="caption-window">
        <span class="ytp-caption-segment" id="seg1">English line one</span>
        <span class="ytp-caption-segment" id="seg2">English line two</span>
      </div>
    </div>
    <video width="800" height="450"></video>
  </div>
</body>
</html>
