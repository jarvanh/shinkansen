<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>spa-nav-drift fixture</title>
</head>
<body>
  <!-- 結構特徵:一般文章頁,多個獨立段落 element。模擬「已翻譯頁面點 url 延伸子孫
       url」的 SPA / 同文件導航:站點保留部分舊節點(下面這幾段)只改 URL,不重建 DOM。
       這些已注入譯文 + 掛 data-shinkansen-translated 的節點若在 SPA reset 時被孤兒化
       (清掉 STATE 還原資料卻留 DOM marker),就會造成 STATE.translated=false 但畫面是
       譯文的殭屍狀態。不綁任何站點身份。 -->
  <article id="content">
    <p id="p1">First paragraph of original English content used by the regression test.</p>
    <p id="p2">Second paragraph of original English content used by the regression test.</p>
  </article>
</body>
</html>
