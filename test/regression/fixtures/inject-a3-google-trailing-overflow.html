<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-a3-google-trailing-overflow</title></head>
<body>
  <!--
    對應 segment fallback「CJK 語序重排：translation 在 inline 後面多出 text」case。

    結構特徵（不綁站名）：
      src 結構：[SPAN.main + DIV(SPAN(A.mention))]
      src 用 SPAN-unwrap 後序列：[text("主文 prose"), inline(A.mention)]
      Google MT 翻譯後 tgt 序列：[text("中文主文"), inline(A.mention), text("溢出文字")]

      英文 "meet buddy @user"（mention 在句尾）翻成
      中文 "見到好友 @user 真是太棒了"（mention 後面多出 text）。

      segment fallback 切分：
        src segments: [[text], A, []]
        tgt segments: [[text], A, [text("溢出")]]
      最後一段 src=[] tgt=[text] 原本觸發 segOk=false → fallback dual。

    修法：把溢出文字吸收進前一個 text segment 的 mutation。

    斷言：
      - 走 nodeValue mutate（不 fallback dual）
      - 沒 SHINKANSEN-TRANSLATION sibling wrapper
      - 主 SPAN.main text 包含翻譯 + 溢出文字
      - A.mention 結構保留
  -->
  <div id="tweet" data-testid="tweetText">
    <span class="text-main">And obviously it was amazing to meet my buddy </span>
    <div class="mention-wrap"><span class="mention-inner"><a class="mention-anchor" href="/vamsibatchuk">@vamsibatchuk</a></span></div>
  </div>
</body>
</html>
