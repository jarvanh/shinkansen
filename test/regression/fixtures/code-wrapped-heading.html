<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>fixture: code-wrapped-heading(整顆標題被 inline <code> 包住必須仍可翻譯)</title>
</head>
<body>
  <!--
    對應「文章內部標題沒被翻譯」bug(v2.0.62 修)。

    結構特徵(通用,不綁站名):
      - 區塊元素的全部文字都在一顆 inline <code> 內:<h2><code>heading text</code></h2>
      - 來源:某些 CMS 編輯器把 code 格式當標題樣式用,CSS 蓋掉 monospace 後
        視覺上就是一般標題,但 DOM 上是 code

    bug:
      inline <code> 序列化一律走 atomic slot(⟦*N⟧),整顆 unit 序列化後 payload
      只剩「⟦*0⟧」——模型無字可翻原樣返還 → echo 偵測標記已翻,標題永遠停在原文。

    修法(結構性通則):
      序列化後若「佔位符以外的殘餘文字不含任何字母/數字」且實質文字全在 CODE
      atomic slot 內 → 重跑一次讓 inline CODE 走 paired 標記(⟦N⟧…⟦/N⟧),
      文字進 payload、<code> wrapper 保留。散在 prose 內的 inline <code>
      (殘餘文字有字母)不受影響,維持 atomic 確定性保護。

    斷言(基於結構特徵):
      1. serialize(h2) 輸出含標題文字本身 + paired 標記(非 atomic)
      2. 控制組:prose 段落內 inline <code> 仍是 atomic(⟦*N⟧,identifier 不進 payload)
      3. 注入譯文後 h2 內 <code> 元素仍在(樣式保留)且內文已翻成中文
      4. Google MT serializer 同 pattern(【N】paired)
  -->

  <article>
    <h2 id="code-heading"><code>Who will take over the role? </code></h2>

    <p id="prose-with-code">The function <code>fetchData()</code> returns a Promise defined in <code>config.json</code>.</p>
  </article>
</body>
</html>
